name: Daily News Update
on:
  schedule:
    - cron: '0 23 * * 1-5'   # 07:00 SGT (월-금)
    - cron: '0 7 * * 1-5'    # 15:00 SGT (월-금)
    - cron: '0 23 * * 6'     # 07:00 SGT (토)
    - cron: '0 7 * * 6'      # 15:00 SGT (토)
    - cron: '0 23 * * 0'     # 07:00 SGT (일)
    - cron: '0 7 * * 0'      # 15:00 SGT (일)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install google-genai requests beautifulsoup4 pytz
      - name: Fetch news with Gemini
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python fetch_news.py
      - name: Commit & push news data
        run: |
          git config user.name "News Bot"
          git config user.email "bot@example.com"
          git add news_data.json
          git diff --staged --quiet || git commit -m "news: update $(date +'%Y-%m-%d %H:%M SGT')"
          git push
